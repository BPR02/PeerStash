[supervisord]
nodaemon=true
user=root
logfile=/var/log/peerstash/supervisord.log
logfile_maxbytes=10MB
logfile_backups=5

[program:cron]
command=cron -f
autostart=true
autorestart=true
stdout_logfile=/var/log/peerstash/cron.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/peerstash/cron_err.log
stderr_logfile_maxbytes=10MB

[program:sshd]
command=[program:sshd]
command=bash -c "set -o pipefail; /usr/sbin/sshd -D -e 2>&1 | awk '{ print strftime(\"[%%Y-%%m-%%d %%H:%%M:%%S]\"), $0; fflush() }'"
autostart=true
autorestart=true
stdout_logfile=/var/log/peerstash/sshd.log
stdout_logfile_maxbytes=5MB
stderr_logfile=/var/log/peerstash/sshd_err.log
stderr_logfile_maxbytes=10MB

[program:tail-logger]
command=tail -qF /var/log/peerstash/supervisord.log /var/log/peerstash/cron.log /var/log/peerstash/cron_err.log /var/log/peerstash/sshd.log /var/log/peerstash/sshd_err.log
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:tailscaled]
command=/usr/local/bin/tailscaled --tun=peerstash0
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:peerstashd]
command=/usr/local/bin/peerstashd
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
