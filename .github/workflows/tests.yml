name: "Tests"

on:
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd peerstash-control
          pip install uv
          uv pip install --system -e .[dev]

      - name: Run unit tests
        run: |
          cd peerstash-control
          uv run pytest tests/ --ignore=tests/test_integration_docker.py -v

  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Docker tests
        run: bash scripts/run_docker_tests.sh
